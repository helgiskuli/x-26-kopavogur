  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #f4f5f7;
    color: #1a1f2e;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #ffffff;
    border-bottom: 1px solid #e2e5ea;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a1f2e;
  }
  header h1 span {
    font-weight: 400;
    color: #6b7280;
    margin-left: 8px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    background: #f4f5f7;
    border: 1px solid #d1d5db;
    color: #374151;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover {
    background: #e9ebee;
    color: #1a1f2e;
  }
  .btn-primary {
    background: rgba(59, 100, 220, 0.08);
    border-color: rgba(59, 100, 220, 0.25);
    color: #3b64dc;
  }
  .btn-primary:hover {
    background: rgba(59, 100, 220, 0.15);
  }
  .btn-active {
    background: rgba(59, 100, 220, 0.15);
    border-color: rgba(59, 100, 220, 0.5);
    color: #3b64dc;
  }

  .main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 300px;
    background: #ffffff;
    border-right: 1px solid #e2e5ea;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .filter-section {
    padding: 16px;
    border-bottom: 1px solid #e2e5ea;
  }

  .filter-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .party-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .party-toggle:hover { background: #f4f5f7; }
  .party-toggle.dimmed { opacity: 0.3; }
  .party-toggle.selected {
    background: #f0f2f8;
    font-weight: 600;
  }
  .party-toggle.selected .party-name { color: #1a1f2e; }

  .party-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .party-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    color: #1a1f2e;
  }

  .party-count {
    font-size: 11px;
    color: #9ca3af;
    font-variant-numeric: tabular-nums;
  }

  .candidate-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .candidate-list::-webkit-scrollbar { width: 4px; }
  .candidate-list::-webkit-scrollbar-track { background: transparent; }
  .candidate-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

  .candidate-card {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .candidate-card:hover { background: #f4f5f7; }
  .candidate-card.active { background: #eef0f3; }

  .candidate-rank {
    font-size: 10px;
    color: #9ca3af;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .candidate-name-text {
    font-size: 13px;
    font-weight: 500;
    color: #1a1f2e;
    line-height: 1.3;
  }
  .candidate-address {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 1px;
  }

  #map {
    flex: 1;
    background: #e8eaed;
  }

  .stats-bar {
    padding: 12px 16px;
    border-bottom: 1px solid #e2e5ea;
    font-size: 12px;
    color: #9ca3af;
    display: flex;
    justify-content: space-between;
  }

  .search-box {
    width: 100%;
    background: #f4f5f7;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 8px 10px;
    color: #1a1f2e;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 12px;
  }
  .search-box:focus { border-color: rgba(59, 100, 220, 0.4); }
  .search-box::placeholder { color: #9ca3af; }

  /* Leaflet popup styling */
  .leaflet-popup-content-wrapper {
    background: #ffffff;
    border: 1px solid #e2e5ea;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    color: #1a1f2e;
  }
  .leaflet-popup-tip { background: #ffffff; }
  .leaflet-popup-content { margin: 12px 16px; font-family: 'DM Sans', system-ui; }

  .popup-party {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .popup-name {
    font-size: 15px;
    font-weight: 700;
    color: #1a1f2e;
    margin-bottom: 2px;
  }
  .popup-address {
    font-size: 12px;
    color: #6b7280;
  }
  .popup-rank {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 4px;
  }

  @media (max-width: 768px) {
    .sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid #e2e5ea; }
    .main-container { flex-direction: column; }
  }
</style>
</head>

  </aside>
  <div id="map"></div>
</div>

let selectedParty = null;

const partyMeta = {};

// Extract party info
candidateData.features.forEach(f => {
  const p = f.properties.party;
  if (!partyMeta[p]) {
    partyMeta[p] = { color: f.properties.party_color, count: 0 };

// ============ MAP INIT ============
function initMap() {
  map = L.map('map', {
    center: [64.1020, -21.9000],
    zoom: 14,
    zoomControl: false,
    attributionControl: true
  });

  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  L.geoJSON(borderData, {
    style: {
      color: '#3b64dc',
      weight: 1.5,
      opacity: 0.25,
      fillColor: '#3b64dc',
      fillOpacity: 0.02,
      dashArray: '6 4'
    }
  }).addTo(map);

  heatLayer = L.heatLayer(densityData, {
    radius: 28,
    blur: 18,
    max: 424,
    gradient: { 0.2: '#fde68a', 0.5: '#f97316', 0.75: '#dc2626', 1.0: '#7f1d1d' }
  });

  renderMarkers();
}

function createCircleIcon(color) {
  return L.divIcon({
    html: `<div style="
      width: 12px; height: 12px;
      background: ${color};
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    "></div>`,
    className: '',
    iconSize: [12, 12],
    iconAnchor: [6, 6],
    popupAnchor: [0, -8]
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const filtered = getFilteredFeatures();

  filtered.forEach(f => {
    const p = f.properties;
    const [lon, lat] = f.geometry.coordinates;
    const marker = L.marker([lat, lon], {
      icon: createCircleIcon(p.party_color)
    });

    marker.bindPopup(`
      <div class="popup-party" style="color: ${p.party_color}">${p.party}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-address">${p.address}, Kópavogur</div>
      <div class="popup-rank">#${p.list_rank} á lista</div>
    `);

    marker.featureProps = p;
    marker.addTo(map);
    markers.push(marker);
  });

  updateStats(filtered.length);
}

function getFilteredFeatures() {
  return candidateData.features.filter(f => {
    const p = f.properties;
    if (selectedParty && p.party !== selectedParty) return false;
    if (searchText && !p.name.toLowerCase().includes(searchText) &&
        !p.address.toLowerCase().includes(searchText)) return false;
    return true;
  });
}

  const container = document.getElementById('partyFilters');
  const sortedParties = Object.entries(partyMeta).sort((a, b) => a[0].localeCompare(b[0]));

  container.innerHTML = sortedParties.map(([name, meta]) => `
    <div class="party-toggle ${selectedParty === null ? '' : selectedParty === name ? 'selected' : 'dimmed'}"
         onclick="selectParty('${name}')" data-party="${name}">
      <div class="party-dot" style="background: ${meta.color}"></div>
      <span class="party-name">${name}</span>
      <span class="party-count">${meta.count}</span>
    </div>
  `).join('');
}

function renderCandidateList() {
  const container = document.getElementById('candidateList');
  const filtered = getFilteredFeatures();

  filtered.sort((a, b) => {
    const pc = a.properties.party.localeCompare(b.properties.party);
    if (pc !== 0) return pc;
    return a.properties.list_rank - b.properties.list_rank;
  });

  let currentParty = '';
  let html = '';

  filtered.forEach(f => {
    const p = f.properties;
    if (p.party !== currentParty) {
      currentParty = p.party;
      html += `<div style="padding: 8px 12px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: ${p.party_color}; font-weight: 600; margin-top: 8px;">${p.party}</div>`;
    }
    html += `
      <div class="candidate-card" style="border-left-color: ${p.party_color}"
           onclick="focusCandidate(${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}, '${p.name.replace(/'/g, "\\'")}')">
        <div class="candidate-rank">#${p.list_rank}</div>
        <div class="candidate-name-text">${p.name}</div>
        <div class="candidate-address">${p.address}</div>
      </div>
    `;
  });

  container.innerHTML = html || '<div style="padding: 24px; text-align: center; color: #9ca3af; font-size: 13px;">Enginn frambjóðandi fundinn</div>';
}

function selectParty(name) {
  selectedParty = selectedParty === name ? null : name;
  renderPartyFilters();
  renderMarkers();
  renderCandidateList();
}

function filterCandidates() {
  searchText = document.getElementById('searchBox').value.toLowerCase();
  renderMarkers();
  renderCandidateList();
}

function focusCandidate(lat, lon, name) {
  map.setView([lat, lon], 17);
  markers.forEach(m => {
    if (m.featureProps.name === name) {
      m.openPopup();
    }
  });
}

function updateStats(count) {
  document.getElementById('visibleCount').textContent = `${count} frambjóðendur`;
  const visibleParties = selectedParty ? 1 : Object.keys(partyMeta).length;
  document.getElementById('partyCountLabel').textContent = `${visibleParties} flokkar`;
}

function resetView() {
  selectedParty = null;
  document.getElementById('searchBox').value = '';
  searchText = '';
  map.setView([64.1020, -21.9000], 14);
  renderPartyFilters();
  renderMarkers();
  renderCandidateList();
}

function downloadGeoJSON() {
  const filtered = getFilteredFeatures();
  const exportData = { type: "FeatureCollection", features: filtered };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/geo+json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kopavogur_kosningar_2026.geojson';
  a.click();
  URL.revokeObjectURL(url);
}

function toggleHeat() {
  heatVisible = !heatVisible;
  if (heatVisible) {
    heatLayer.addTo(map);
  } else {
    map.removeLayer(heatLayer);
  }
  const btn = document.getElementById('heatBtn');
  btn.classList.toggle('btn-active', heatVisible);
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  renderPartyFilters();
  renderCandidateList();
});
</script>
</body>
</html>
